<!DOCTYPE html>
<html>

<head>
    <title>Salesforce Validation Rules</title>

   <style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #141e30, #243b55);
    margin: 0;
    padding: 30px;
    color: white;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #0070d2;
}

.top-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: #0070d2;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #005fb2;
    transform: scale(1.05);
}

table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 10px;
}

th {
    background-color: #0070d2;
    color: white;
    padding: 15px;
}

td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background-color: #f2f2f2;
}

.active-badge {
    background-color: green;
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 14px;
}

.inactive-badge {
    background-color: red;
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 14px;
}

</style>

</head>

<body>

	<div class="container">
	
	<h1>Salesforce Validation Rule Manager</h1>

    <div class="top-buttons">

    <button onclick="getRules()">
        Get Validation Rules
    </button>

    <button onclick="deployChanges()">
        Deploy Changes
    </button>

</div>

    

    <table border="1" id="rulesTable">

        <tr>
            <th>Rule Name</th>
            <th>Active</th>
            <th>Action</th>
        </tr>

    </table>

    <script>

        const hash = window.location.hash;

        const params = new URLSearchParams(hash.substring(1));

        const accessToken = params.get("access_token");

        const instanceUrl = params.get("instance_url");

        // Fetch validation rules

        async function getRules() {

            const response = await fetch(
                `/rules?token=${accessToken}&instanceUrl=${instanceUrl}`
            );

            const text = await response.text();

            console.log(text);

            const data = JSON.parse(text);

            const table = document.getElementById("rulesTable");

            // Remove old rows except header

            table.innerHTML = `
                <tr>
                    <th>Rule Name</th>
                    <th>Active</th>
                    <th>Action</th>
                </tr>
            `;

            data.records.forEach(rule => {

                const row = table.insertRow();

                const cell1 = row.insertCell(0);

                const cell2 = row.insertCell(1);

                const cell3 = row.insertCell(2);

                cell1.innerHTML = rule.ValidationName;

                if(rule.Active){

                    cell2.innerHTML =
                        `<span class="active-badge">Active</span>`;

                } else {

                    cell2.innerHTML =
                        `<span class="inactive-badge">Inactive</span>`;
                }

                // Create toggle button

                const button = document.createElement("button");

                button.innerText = "Toggle";

                button.onclick = function () {

                    toggleRule(rule.Id, cell2);

                };

                cell3.appendChild(button);

            });
        }

        // Toggle validation rule

        async function toggleRule(ruleId, statusCell) {

            const response = await fetch(
                `/toggleRule?id=${ruleId}`
            );

            const data = await response.text();

            let currentValue = statusCell.innerHTML;

            if (currentValue === "true") {

                statusCell.innerHTML = "false";

            } else {

                statusCell.innerHTML = "true";
            }

            alert(data);
        }

        // Deploy changes

        function deployChanges() {

            alert("Changes deployed successfully to Salesforce!");

        }

    </script>
    
    </div>
    
    <footer style="text-align:center; margin-top:30px; color:white;">
    Built by Sujal Rathore
</footer>

</body>

</html>
